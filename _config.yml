# Defaults
defaults:

  # all posts
  - scope:
      path: "_posts"
    values:
      layout: post
      author: sal
      avatar: /assets/images/avatar1.jpg
      lang: en

  # French posts collection
  - scope:
      path: "_fr_posts"
      type: "fr_posts"
    values:
      layout: post-sidebar
      author: ductri
      avatar: /assets/images/avatar1.jpg
      lang: fr

  # Vietnamese posts collection
  - scope:
      path: "_vi_posts"
      type: "vi_posts"
    values:
      layout: post-sidebar
      author: ductri
      avatar: /assets/images/avatar1.jpg
      lang: vi

  # all pages
  - scope:
      path: "_pages"
    values:
      layout: page
      lang: en

  # Course index pages
  - scope:
      path: "_courses"
      type: "courses"
    values:
      layout: lesson
      author: Duc-Tri VO

# Syntax
markdown: kramdown
highlighter: rouge

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: true # optional
  # input: GFM
  # footnote_nr: 1

# Paginate
paginate: 10


toc:
  min_level: 2      # Minimum heading level (h2)
  max_level: 4      # Maximum heading level (h4)
  no_toc_section_class: no_toc  # class to exclude from toc
  list_class: toc-list
  sublist_class: toc-sublist
  item_class: toc-item
  item_prefix: toc-

# Exclude metadata and development time dependencies (like Grunt plugins)
exclude: [README.markdown, package.json, grunt.js, Gruntfile.js, Gruntfile.coffee, node_modules]

collections:
  courses:
    output: true
  fr_posts:
    output: true
    permalink: /fr/:path/
  vi_posts:
    output: true
    permalink: /vi/:path/